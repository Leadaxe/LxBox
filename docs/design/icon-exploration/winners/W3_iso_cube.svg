<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="w3bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="w3top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="w3right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#0C4A6E"/>
    </linearGradient>
    <linearGradient id="w3left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#0C1E52"/>
    </linearGradient>
    <linearGradient id="w3cord" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#w3bg)"/>

  <!-- Isometric cube, centered -->
  <g transform="translate(256 256)">
    <!-- left face -->
    <path d="M -146 -38 L 0 42 L 0 194 L -146 114 Z" fill="url(#w3left)"/>
    <!-- right face -->
    <path d="M 146 -38 L 0 42 L 0 194 L 146 114 Z" fill="url(#w3right)"/>
    <!-- top face -->
    <path d="M 0 -124 L 146 -38 L 0 42 L -146 -38 Z" fill="url(#w3top)"/>

    <!-- small L etched on top face -->
    <path d="M -48 -66 L -48 -16 L 22 -16"
          fill="none" stroke="#0F172A" stroke-width="14"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- L-shaped amber tunnel cord, emerging from top vertex -->
  <path d="M 256 132 L 256 86 L 382 86"
        fill="none" stroke="url(#w3cord)" stroke-width="26"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
