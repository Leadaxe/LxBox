<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="w2bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="w2x" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#w2bg)"/>

  <!-- "Box" hint: L shaped as inside-corner bracket, thick, hugging lower-left -->
  <path d="M 120 130 L 120 392 L 350 392"
        fill="none" stroke="#F8FAFC" stroke-width="64"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- × dominant, crossing the corner of L, amber = routing-accent -->
  <g stroke="url(#w2x)" stroke-width="58" stroke-linecap="round">
    <line x1="232" y1="218" x2="404" y2="390"/>
    <line x1="404" y1="218" x2="232" y2="390"/>
  </g>
</svg>
