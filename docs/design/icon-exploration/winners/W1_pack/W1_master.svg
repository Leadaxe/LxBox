<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="amber" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Arrow A: top-left → bottom-right, cyan -->
  <line x1="108" y1="108" x2="360" y2="360"
        stroke="url(#cyan)" stroke-width="56" stroke-linecap="round"/>
  <path d="M 428 428 L 388.3 331.7 L 331.7 388.3 Z" fill="url(#cyan)"/>

  <!-- Arrow B: top-right → bottom-left, amber -->
  <line x1="404" y1="108" x2="152" y2="360"
        stroke="url(#amber)" stroke-width="56" stroke-linecap="round"/>
  <path d="M 84 428 L 180.3 388.3 L 123.7 331.7 Z" fill="url(#amber)"/>

  <!-- Central node: ivory disc with amber core -->
  <circle cx="256" cy="256" r="54" fill="#F8FAFC"/>
  <circle cx="256" cy="256" r="18" fill="#F59E0B"/>
</svg>
