<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Minimal × — two thick lines, no arrowheads, no inner node detail. Reads at 16px. -->
  <g stroke-width="72" stroke-linecap="round">
    <line x1="128" y1="128" x2="384" y2="384" stroke="#22D3EE"/>
    <line x1="384" y1="128" x2="128" y2="384" stroke="#F59E0B"/>
  </g>
  <!-- central disc, overlaid — gives the "node" signal even at 16px -->
  <circle cx="256" cy="256" r="38" fill="#F8FAFC"/>
</svg>
