<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0F1B2D"/>
      <stop offset="1" stop-color="#1B2E4D"/>
    </linearGradient>
    <linearGradient id="top1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="right1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="left1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1E40AF"/>
      <stop offset="1" stop-color="#0C1E52"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg1)"/>
  <!-- Isometric cube -->
  <g transform="translate(256 290)">
    <!-- left face -->
    <path d="M -140 -40 L 0 40 L 0 180 L -140 100 Z" fill="url(#left1)"/>
    <!-- right face -->
    <path d="M 140 -40 L 0 40 L 0 180 L 140 100 Z" fill="url(#right1)"/>
    <!-- top face -->
    <path d="M 0 -120 L 140 -40 L 0 40 L -140 -40 Z" fill="url(#top1)"/>
    <!-- L-cord emerging -->
    <path d="M 0 -120 L 0 -190 L 100 -190" fill="none" stroke="#F59E0B" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="100" cy="-190" r="12" fill="#FBBF24"/>
  </g>
</svg>
