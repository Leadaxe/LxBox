<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#052E2B"/>
      <stop offset="1" stop-color="#064E3B"/>
    </linearGradient>
    <linearGradient id="arrA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6EE7B7"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="arrB" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg3)"/>
  <!-- path A: top-left -> bottom-right -->
  <g stroke="url(#arrA)" stroke-width="46" stroke-linecap="round" fill="none">
    <path d="M 110 130 L 402 402"/>
  </g>
  <!-- arrowhead A -->
  <path d="M 402 402 L 402 342 M 402 402 L 342 402" stroke="url(#arrA)" stroke-width="46" stroke-linecap="round" fill="none"/>
  <!-- path B: top-right -> bottom-left -->
  <g stroke="url(#arrB)" stroke-width="46" stroke-linecap="round" fill="none">
    <path d="M 402 130 L 110 402"/>
  </g>
  <path d="M 110 402 L 170 402 M 110 402 L 110 342" stroke="url(#arrB)" stroke-width="46" stroke-linecap="round" fill="none"/>
  <!-- central node -->
  <circle cx="256" cy="266" r="30" fill="#0F172A" stroke="#F8FAFC" stroke-width="8"/>
  <circle cx="256" cy="266" r="10" fill="#F8FAFC"/>
</svg>
