<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C0A1E"/>
      <stop offset="1" stop-color="#1E1030"/>
    </linearGradient>
    <linearGradient id="direct5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="proxy5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg5)"/>
  <!-- input stream -->
  <path d="M 80 256 L 220 256" stroke="#22D3EE" stroke-width="44" stroke-linecap="round" fill="none"/>
  <!-- gate box -->
  <rect x="200" y="196" width="120" height="120" rx="24" fill="#0F172A" stroke="#F1F5F9" stroke-width="8"/>
  <!-- × inside gate -->
  <g stroke="#F1F5F9" stroke-width="14" stroke-linecap="round">
    <line x1="228" y1="224" x2="292" y2="288"/>
    <line x1="292" y1="224" x2="228" y2="288"/>
  </g>
  <!-- output: split into two streams -->
  <path d="M 320 240 Q 380 200 432 160" stroke="url(#proxy5)" stroke-width="34" stroke-linecap="round" fill="none"/>
  <path d="M 320 272 Q 380 312 432 352" stroke="url(#direct5)" stroke-width="34" stroke-linecap="round" fill="none"/>
  <!-- end-caps -->
  <circle cx="432" cy="160" r="18" fill="#F472B6"/>
  <circle cx="432" cy="352" r="18" fill="#22D3EE"/>
</svg>
