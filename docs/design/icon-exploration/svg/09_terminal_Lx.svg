<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <filter id="glow9" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg9)"/>
  <!-- faint scanlines -->
  <g fill="#22C55E" opacity="0.05">
    <rect x="0" y="0" width="512" height="4"/>
    <rect x="0" y="16" width="512" height="4"/>
    <rect x="0" y="32" width="512" height="4"/>
    <rect x="0" y="48" width="512" height="4"/>
    <rect x="0" y="64" width="512" height="4"/>
    <rect x="0" y="80" width="512" height="4"/>
    <rect x="0" y="96" width="512" height="4"/>
    <rect x="0" y="112" width="512" height="4"/>
  </g>
  <!-- prompt -->
  <g font-family="Menlo, ui-monospace, monospace" font-weight="700">
    <text x="96" y="232" font-size="54" fill="#22C55E" opacity="0.8">&gt;_</text>
    <g filter="url(#glow9)">
      <text x="92" y="332" font-size="150" fill="#86EFAC">L×</text>
    </g>
    <!-- blinking cursor (static frame) -->
    <rect x="340" y="242" width="28" height="96" fill="#86EFAC"/>
  </g>
</svg>
