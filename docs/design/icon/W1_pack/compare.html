<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>LxBox — W1 · variant A vs B</title>
<style>
  :root { --bg:#0F172A; --card:#111827; --border:#1F2937; --text:#F1F5F9; --mute:#94A3B8; }
  * { box-sizing: border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,Inter,Segoe UI,sans-serif; margin:0; padding:48px; }
  h1 { font-weight:800; font-size:26px; margin:0 0 4px; }
  .sub { color:var(--mute); margin:0 0 32px; font-size:13px; }
  h2 { font-size:11px; margin:32px 0 10px; color:#FDE68A; text-transform:uppercase; letter-spacing:2px; font-weight:700; }
  .two { display:grid; grid-template-columns: 1fr 1fr; gap:24px; }
  .col { background:#1E293B; border-radius:16px; padding:24px; display:flex; flex-direction:column; align-items:center; gap:18px; }
  .col.light { background:#F8FAFC; color:#334155; }
  .col h3 { margin:0; font-size:14px; letter-spacing:.5px; }
  .col.light h3 { color:#0F172A; }
  .tag { display:inline-block; font-size:10px; color:#0F172A; background:#FDE68A; padding:3px 10px; border-radius:999px; font-weight:800; letter-spacing:.5px; text-transform:uppercase; }
  .ladder { display:flex; gap:16px; align-items:flex-end; flex-wrap:wrap; justify-content:center; }
  .sz { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .label { font-size:10px; color:var(--mute); font-family:ui-monospace,Menlo,monospace; }
  .col.light .label { color:#64748B; }
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <!-- Variant A: ivory diagonal TL→BR, navy arrow BL→TR (current master) -->
  <symbol id="A" viewBox="0 0 512 512">
    <defs>
      <linearGradient id="A-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FB923C"/><stop offset="1" stop-color="#EA580C"/></linearGradient>
      <clipPath id="A-clip"><rect width="512" height="512" rx="112"/></clipPath>
    </defs>
    <g clip-path="url(#A-clip)">
      <rect width="512" height="512" fill="url(#A-bg)"/>
      <g stroke="#F8FAFC" stroke-width="56" stroke-linecap="round" fill="none">
        <line x1="67.8" y1="67.8" x2="67.8" y2="444.2"/>
        <line x1="67.8" y1="444.2" x2="256" y2="444.2"/>
        <line x1="67.8" y1="67.8" x2="413.1" y2="413.1"/>
      </g>
      <path d="M 464 464 L 464 362.2 L 362.2 464 Z" fill="#F8FAFC"/>
      <line x1="67.8" y1="444.2" x2="413" y2="99" stroke="#0F172A" stroke-width="56" stroke-linecap="round"/>
      <path d="M 464 48 L 464 149.8 L 362.2 48 Z" fill="#0F172A"/>
      <g stroke="#0F172A" stroke-width="18" stroke-linecap="round" stroke-dasharray="28 45" fill="none">
        <line x1="67.8" y1="67.8" x2="67.8" y2="444.2"/>
        <line x1="67.8" y1="444.2" x2="256" y2="444.2"/>
      </g>
      <circle cx="67.8" cy="67.8" r="54" fill="#0F172A"/><circle cx="67.8" cy="67.8" r="18" fill="#F8FAFC"/>
      <circle cx="67.8" cy="444.2" r="54" fill="#0F172A"/><circle cx="67.8" cy="444.2" r="18" fill="#F8FAFC"/>
      <circle cx="256" cy="256" r="54" fill="#0F172A"/><circle cx="256" cy="256" r="18" fill="#F8FAFC"/>
    </g>
  </symbol>

  <!-- Variant B: same as A but without the dashed inner marks -->
  <symbol id="B" viewBox="0 0 512 512">
    <defs>
      <linearGradient id="B-bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FB923C"/><stop offset="1" stop-color="#EA580C"/></linearGradient>
      <clipPath id="B-clip"><rect width="512" height="512" rx="112"/></clipPath>
    </defs>
    <g clip-path="url(#B-clip)">
      <rect width="512" height="512" fill="url(#B-bg)"/>
      <g stroke="#F8FAFC" stroke-width="56" stroke-linecap="round" fill="none">
        <line x1="67.8" y1="67.8" x2="67.8" y2="444.2"/>
        <line x1="67.8" y1="444.2" x2="256" y2="444.2"/>
        <line x1="67.8" y1="67.8" x2="413.1" y2="413.1"/>
      </g>
      <path d="M 464 464 L 464 362.2 L 362.2 464 Z" fill="#F8FAFC"/>
      <line x1="67.8" y1="444.2" x2="413" y2="99" stroke="#0F172A" stroke-width="56" stroke-linecap="round"/>
      <path d="M 464 48 L 464 149.8 L 362.2 48 Z" fill="#0F172A"/>
      <circle cx="67.8" cy="67.8" r="54" fill="#0F172A"/><circle cx="67.8" cy="67.8" r="18" fill="#F8FAFC"/>
      <circle cx="67.8" cy="444.2" r="54" fill="#0F172A"/><circle cx="67.8" cy="444.2" r="18" fill="#F8FAFC"/>
      <circle cx="256" cy="256" r="54" fill="#0F172A"/><circle cx="256" cy="256" r="18" fill="#F8FAFC"/>
    </g>
  </symbol>
</svg>

<h1>W1 · A vs B</h1>
<p class="sub">Вариант A — ivory диагональ / navy стрелка вверх. Вариант B — navy диагональ / ivory стрелка вверх.</p>

<h2>Большой формат · 360 px</h2>
<div class="two">
  <div class="col"><span class="tag">A · current</span><svg width="360" height="360"><use href="#A"/></svg></div>
  <div class="col"><span class="tag">B · swapped</span><svg width="360" height="360"><use href="#B"/></svg></div>
</div>

<h2>Ladder · 192 / 96 / 48 / 24</h2>
<div class="two">
  <div class="col">
    <span class="tag">A</span>
    <div class="ladder">
      <div class="sz"><svg width="192" height="192"><use href="#A"/></svg><div class="label">192</div></div>
      <div class="sz"><svg width="96" height="96"><use href="#A"/></svg><div class="label">96</div></div>
      <div class="sz"><svg width="48" height="48"><use href="#A"/></svg><div class="label">48</div></div>
      <div class="sz"><svg width="24" height="24"><use href="#A"/></svg><div class="label">24</div></div>
    </div>
  </div>
  <div class="col">
    <span class="tag">B</span>
    <div class="ladder">
      <div class="sz"><svg width="192" height="192"><use href="#B"/></svg><div class="label">192</div></div>
      <div class="sz"><svg width="96" height="96"><use href="#B"/></svg><div class="label">96</div></div>
      <div class="sz"><svg width="48" height="48"><use href="#B"/></svg><div class="label">48</div></div>
      <div class="sz"><svg width="24" height="24"><use href="#B"/></svg><div class="label">24</div></div>
    </div>
  </div>
</div>

<h2>Light backdrop</h2>
<div class="two">
  <div class="col light"><span class="tag">A</span><svg width="200" height="200"><use href="#A"/></svg></div>
  <div class="col light"><span class="tag">B</span><svg width="200" height="200"><use href="#B"/></svg></div>
</div>

</body>
</html>
