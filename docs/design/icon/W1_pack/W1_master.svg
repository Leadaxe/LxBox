<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <clipPath id="box">
      <rect width="512" height="512" rx="112"/>
    </clipPath>
  </defs>

  <g clip-path="url(#box)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Ivory L-frame (inside) + diagonal -->
    <g stroke="#F8FAFC" stroke-width="56" stroke-linecap="round" fill="none">
      <line x1="67.8" y1="67.8" x2="67.8" y2="444.2"/>
      <line x1="67.8" y1="444.2" x2="256" y2="444.2"/>
      <line x1="67.8" y1="67.8" x2="413.1" y2="413.1"/>
    </g>
    <path d="M 464 464 L 464 362.2 L 362.2 464 Z" fill="#F8FAFC"/>

    <!-- Navy arrow BL → TR -->
    <line x1="67.8" y1="444.2" x2="413" y2="99"
          stroke="#0F172A" stroke-width="56" stroke-linecap="round"/>
    <path d="M 464 48 L 464 149.8 L 362.2 48 Z" fill="#0F172A"/>

    <!-- Navy marks inside ivory lines: bracket legs extend to circles, dash inside horizontal -->
    <g stroke="#0F172A" stroke-width="18" stroke-linecap="round" stroke-dasharray="28 45" fill="none">
      <!-- dashed inner vertical only -->
      <line x1="67.8" y1="67.8" x2="67.8" y2="444.2"/>
    </g>

    <!-- Three nodes: navy disc + ivory core -->
    <circle cx="67.8" cy="67.8" r="54" fill="#0F172A"/>
    <circle cx="67.8" cy="67.8" r="18" fill="#F8FAFC"/>

    <circle cx="67.8" cy="444.2" r="54" fill="#0F172A"/>
    <circle cx="67.8" cy="444.2" r="18" fill="#F8FAFC"/>

    <circle cx="256" cy="256" r="54" fill="#0F172A"/>
    <circle cx="256" cy="256" r="18" fill="#F8FAFC"/>
  </g>
</svg>
