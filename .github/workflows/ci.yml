# BoxVPN — CI на GitHub Actions (сборка Android на сервере GitHub).
# Требуется каталог app/ с проектом Flutter (см. docs/BUILD.md).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Ручной запуск: Actions → CI → Run workflow (без inputs — совместимо с push/PR).
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.6"
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      # Не использовать secrets в if: — иначе workflow может не пройти валидацию (run 0s / file issue).
      - name: Android release keystore (optional)
        working-directory: app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret; release APK will use debug signing."
            exit 0
          fi
          : "${ANDROID_KEYSTORE_PASSWORD:?Set ANDROID_KEYSTORE_PASSWORD when BASE64 is set}"
          : "${ANDROID_KEY_PASSWORD:?Set ANDROID_KEY_PASSWORD when BASE64 is set}"
          : "${ANDROID_KEY_ALIAS:?Set ANDROID_KEY_ALIAS when BASE64 is set}"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties

      # Debug APK только при переменной репозитория BUILD_DEBUG_APK=true (см. docs/BUILD.md).
      - name: Build APK (debug)
        if: ${{ vars.BUILD_DEBUG_APK == 'true' }}
        run: flutter build apk --debug

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK (debug)
        if: ${{ vars.BUILD_DEBUG_APK == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: app/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

      - name: Upload APK (release)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
