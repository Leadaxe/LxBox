# BoxVPN — CI/CD
#
# 1) Tag push (v*):     checks → build → GitHub Release (draft)
# 2) workflow_dispatch:  checks → build (optional)
# 3) push to main / PR: checks only

name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_mode:
        description: "checks | build | release"
        required: true
        default: "checks"
        type: choice
        options: [checks, build, release]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  meta:
    name: Meta
    if: startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode != 'checks')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_release: ${{ steps.meta.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compute version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.inputs.run_mode }}" == "release" ]]; then
            VERSION="$(git describe --tags --always)"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA="$(git rev-parse --short=7 HEAD)"
            echo "version=dev-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.6"
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  android:
    if: startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode != 'checks')
    needs: [meta, checks]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.6"
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Android release keystore (optional)
        working-directory: app
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret; release APK will use debug signing."
            exit 0
          fi
          : "${ANDROID_KEYSTORE_PASSWORD:?Set ANDROID_KEYSTORE_PASSWORD when BASE64 is set}"
          : "${ANDROID_KEY_PASSWORD:?Set ANDROID_KEY_PASSWORD when BASE64 is set}"
          : "${ANDROID_KEY_ALIAS:?Set ANDROID_KEY_ALIAS when BASE64 is set}"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          {
            echo "storePassword=$ANDROID_KEYSTORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK (release)
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-release
          path: app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: ${{ startsWith(github.ref, 'refs/tags/') && 1 || 30 }}

  release:
    name: Create Release
    needs: [meta, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: needs.meta.outputs.is_release == 'true'
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk-release
          path: release-artifacts

      - name: Rename APK
        run: mv release-artifacts/app-release.apk release-artifacts/BoxVPN-${{ needs.meta.outputs.version }}.apk

      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          sparse-checkout: RELEASE_NOTES.md
          sparse-checkout-cone-mode: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: BoxVPN ${{ needs.meta.outputs.version }}
          draft: true
          files: release-artifacts/BoxVPN-${{ needs.meta.outputs.version }}.apk
          body_path: RELEASE_NOTES.md
