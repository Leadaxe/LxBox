name: lxbox
description: L×Box — Android MVP (sing-box + Clash API).
publish_to: 'none'

version: 1.5.0+11

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  json5: ^0.8.2
  file_picker: ^11.0.2
  path_provider: ^2.1.5
  shared_preferences: ^2.3.4
  share_plus: ^10.1.4
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  device_info_plus: ^10.1.2
  package_info_plus: ^8.0.2
  connectivity_plus: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/wizard_template.json
    - assets/icons/app_icon.png

# Иконка из sing-box Launcher (macOS .app Resources/app.icns → PNG 1024²).
flutter_launcher_icons:
  image_path: assets/icons/app_icon.png
  android: true
  ios: true
  macos:
    generate: true
  windows:
    generate: true
  web:
    generate: true
